apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: swiftpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-role"
        vault.hashicorp.com/agent-inject-secret-db: "swiftpay/data/auth-db"
    spec:
      serviceAccountName: auth-serviceaccount
      containers:
      - name: auth-service
        image: traefik/whoami:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "auth-postgresql.swiftpay.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "authdb"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: swiftpay
spec:
  selector:
    app: auth-service
  ports:
  - port: 4001
    targetPort: 80
  type: ClusterIP
